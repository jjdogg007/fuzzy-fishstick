<!DOCTYPE html>
<html>
<head>
    <title>Audit Log</title>
</head>
<body>
    <h1>Audit Log</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Action</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.timestamp }}</td>
                <td>{{ log.action }}</td>
                <td>{{ log.details }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">No audit log entries yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="{% url 'employee_management' %}">Back to Employee Management</a>
</body>
</html>
