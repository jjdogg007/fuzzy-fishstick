<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule NSG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="status-indicator"></div>
    <header>
        <h1>Schedule NSG Dashboard</h1>
        <button id="sign-out-btn">Sign Out</button>
    </header>

    <div class="quadrant-container">
        <div class="quadrant" id="quadrant-employees">
            <h3>Employees</h3>
            <p>Manage your team members.</p>
        </div>
        <div class="quadrant" id="quadrant-shifts">
            <h3>Shifts</h3>
            <p>View and manage shifts.</p>
        </div>
        <div class="quadrant" id="quadrant-pto">
            <h3>PTO Requests</h3>
            <p>Approve or deny time off.</p>
        </div>
        <div class="quadrant" id="quadrant-bids">
            <h3>Shift Bids</h3>
            <p>Manage bids for open shifts.</p>
        </div>
    </div>

    <hr>
    <h2>Calendar View</h2>
    <div id="calendar"></div>
    <div id="toast-container"></div>

    <!-- Modals -->
    <div id="employees-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="add-employee-form-container"></div>
            <div id="employee-list-container"></div>
        </div>
    </div>

    <div id="shifts-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="add-shift-form-container"></div>
            <div id="shift-list-container"></div>
        </div>
    </div>

    <div id="pto-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="add-pto-request-form-container"></div>
            <div id="pto-dashboard-container"></div>
        </div>
    </div>

    <div id="bids-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="shift-bids-container"></div>
        </div>
    </div>

    <!-- Edit Shift Modal -->
    <div id="edit-shift-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Edit Shift</h2>
            <form id="edit-shift-form">
                <input type="hidden" id="edit-shift-id" name="id">
                <label for="edit-shift-date">Date:</label>
                <input type="date" id="edit-shift-date" name="shift_date" required>
                <label for="edit-start-time">Start Time:</label>
                <input type="time" id="edit-start-time" name="start_time" required>
                <label for="edit-end-time">End Time:</label>
                <input type="time" id="edit-end-time" name="end_time" required>
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Edit Employee Modal -->
    <div id="edit-employee-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn-employee">&times;</span>
            <h2>Edit Employee</h2>
            <form id="edit-employee-form">
                <input type="hidden" id="edit-employee-id" name="id">
                <label for="edit-employee-name">Name:</label>
                <input type="text" id="edit-employee-name" name="name" required>
                <label for="edit-employee-email">Email:</label>
                <input type="email" id="edit-employee-email" name="email">
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.js'></script>
    <script src="config.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
