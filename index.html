<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule NSG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Schedule NSG</h1>
    <div id="app"></div>
    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="main.js"></script>

    <!-- The Modal -->
    <div id="edit-shift-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Edit Shift</h2>
            <form id="edit-shift-form">
                <input type="hidden" id="edit-shift-id" name="id">
                <label for="edit-shift-date">Date:</label>
                <input type="date" id="edit-shift-date" name="shift_date" required>
                <label for="edit-start-time">Start Time:</label>
                <input type="time" id="edit-start-time" name="start_time" required>
                <label for="edit-end-time">End Time:</label>
                <input type="time" id="edit-end-time" name="end_time" required>
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>
</body>
</html>
